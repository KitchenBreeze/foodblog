<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KitchenBreeze Rezept</title>

<meta id="metaDescription" name="description" content="">

<link rel="icon" type="image/png" href="logo1.png">
<link rel="stylesheet" href="recipe-style.css">

<style>
.step-images {
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

.step-image {
    width:280px;
    height:280px;
    object-fit:contain;
    border-radius:20px;
}
    

body {
    margin: 0;
    font-family: Georgia, serif;
    background-color: #0f0f10;
    color: #f2eee9;
}

/* TOP */
.topbar {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.back {
    color: #b8b2aa;
    text-decoration: none;
    font-size: 14px;
}

/* HERO */
.hero-img {
    width: 100%;
    max-height: 500px;
    object-fit: cover;
    border-radius: 18px;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* TITLE */
.title {
    font-size: 40px;
    font-weight: 300;
    margin: 20px 0 5px;
    text-align: center;
}

/* TIME + INFO */
.time-row,
.info-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 25px;
    text-align: center;
    width: 100%;
    margin: 25px auto;
}

.time-row > div,
.info-row > div {
    text-align: center;
    min-width: 120px;
}

.time-row strong {
    display: block;
    margin-top: 6px;
    font-size: 18px;
    color: white;
}

/* BUTTONS */
.buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}

button {
    background: #171718;
    border: 1px solid #2a2a2a;
    color: #f2eee9;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #222;
}

/* CARD */
.card {
    background: #171718;
    border-radius: 16px;
    padding: 20px;
    margin-top: 20px;
}

/* INGREDIENTS */
.ingredient-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.ingredient-list li {
    margin-bottom: 10px;
}

.ingredient-list label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    color: #ddd;
}

.ingredient-list input {
    width: 18px;
    height: 18px;
    accent-color: white;
}

/* STEPS */
.step {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
}

.step-number {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border-radius: 50%;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
}

.step-text {
    color: #ddd;
    flex:1;
}
@media print {

    @page {
        size: A4;
        margin: 1.5cm;
    }

    body {
        background: white !important;
        color: black !important;
        font-family: Georgia, serif;
        font-size: 12pt;
    }


    /* AUSBLENDEN */

    .topbar,
    .buttons,
    .back,
    input[type="checkbox"],
    footer,
    .related-section {
        display: none !important;
    }


    /* CONTAINER */

    .container {
        max-width: 100%;
        padding: 0;
        margin: 0 auto;
    }


    /* TITEL */

    .title {
        text-align: center;
        font-size: 28pt;
        color: black !important;
        margin-bottom: 20px;
        page-break-after: avoid;
    }


    /* HAUPTBILD */

    .hero-img {
        display: block;
        margin: 0 auto 10px auto;
        width: 45%;
        max-height: 150px;
        object-fit: cover;
        border-radius: 10px;
    }


    /* BESCHREIBUNG AUSBLENDEN */

    p[style*="text-align:center"] {
        display: none !important;
    }


    /* ZEITEN + INFOS */

    .time-row,
    .info-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        text-align: center;
        margin: 8px 0;
        color: black !important;
        font-size: 11pt;
    }


    .time-row strong {
        display: block;
        font-size: 13pt;
        margin-top: 4px;
        color: black !important;
    }


    /* ZUTATEN / ZUBEREITUNG BOXEN */

    .card {

        background: white !important;
        color: black !important;

        border: none;
        padding: 0;
        margin-top: 15px;

        page-break-inside: avoid;
    }


    .card h2 {

        color: black !important;

        border-bottom: 1px solid #999;
        padding-bottom: 5px;
        margin-bottom: 15px;
    }



    /* ZUTATEN */

    .ingredient-list {

        list-style: disc;
        padding-left: 20px;
    }


    .ingredient-list label {

        display: inline;
        color: black !important;
    }


    .ingredient-list input {

        display: none;
    }



    /* ZUBEREITUNG */

    .step {

        display: flex !important;

        gap: 12px;

        margin-bottom: 15px;

        page-break-inside: avoid;
    }


    .step-number {

        display: flex !important;

        align-items: center;
        justify-content: center;

        background: none !important;

        color: black !important;

        font-weight: bold;

        width: 25px;
        min-width: 25px;
    }


    .step-text {

        display: block !important;

        flex: 1;

        color: black !important;
    }


    .step-text p {

        color: black !important;
    }



    /* SCHRITTBILDER AUSBLENDEN */

    .step-images {

        display: none !important;
    }



    /* LISTEN / TIPPS */

    ul {

        color: black !important;
    }


    li {

        color: black !important;
    }



    /* PRINT FOOTER */

    .print-footer {

        display: block;

        text-align: center;

        font-size: 8pt;

        color: #888;

        margin-top: 60px;
    }

}

</style>

</head>

<body>

<div id="content"></div>

<script src="recipes.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");
const recipe = RECIPES.find(r => r.id === id);

const container = document.getElementById("content");

// SEO Daten setzen

if(recipe){

    // Titel im Browser ändern
    document.title = recipe.title + " – KitchenBreeze";


    // Google Beschreibung setzen
    const metaDescription = document.getElementById("metaDescription");

    if(metaDescription){

        metaDescription.setAttribute(
            "content",
            recipe.description
        );

    }

}
if(!recipe){

    container.innerHTML = "<p style='text-align:center;'>Rezept nicht gefunden</p>";

} else {

container.innerHTML = `

<div class="topbar">
<a class="back" href="index.html">← Zur Übersicht</a>
</div>

<div class="container">

  <img 
class="hero-img" 
src="${recipe.image}" 
alt="${recipe.title} – KitchenBreeze">

    <h1 class="title">${recipe.title}</h1>

    <!-- ZEITEN -->
    <div class="time-row">

        <div>
             Zubereitung<br>
            <strong>${recipe.time.preparation}</strong>
        </div>

        ${recipe.time.cooking ? `
        <div>
             Kochen<br>
            <strong>${recipe.time.cooking}</strong>
        </div>` : ""}

        ${recipe.time.baking ? `
        <div>
             Backen<br>
            <strong>${recipe.time.baking}</strong>
        </div>` : ""}

        ${recipe.time.rising ? `
<div>
     Gehzeit<br>
    <strong>${recipe.time.rising}</strong>
</div>` : ""}

       ${recipe.time.resting ? `
<div>
     Ruhen<br>
    <strong>${recipe.time.resting}</strong>
</div>` : ""}
        ${recipe.time.cooling ? `
        <div>
             Abkühlen<br>
            <strong>${recipe.time.cooling}</strong>
        </div>` : ""}

        
        <div>
             Gesamt<br>
            <strong>${recipe.time.total}</strong>
        </div>

    </div>

    <!-- INFO -->
    <div class="info-row">
        <div>Portionen: ${recipe.portions}</div>
        <div>Schwierigkeit: ${recipe.difficulty}</div>
        <div>Kategorie: ${recipe.category}</div>
    </div>

    <!-- BUTTONS -->
    <div class="buttons">
        <button onclick="window.print()">🖨️ Drucken</button>
      <button id="favoriteBtn">
    ❤️ Favorit
</button>
    </div>

    <p style="text-align:center; color:#b8b2aa;">
        ${recipe.description}
    </p>

    <!-- ZUTATEN -->
    <div class="card">
        <h2>Zutaten</h2>

        ${
            Array.isArray(recipe.ingredients)

            ? `
                <ul class="ingredient-list">
                    ${recipe.ingredients.map(i => `
                        <li>
                            <label>
                                <input type="checkbox">
                                <span>${i}</span>
                            </label>
                        </li>
                    `).join("")}
                </ul>
            `

            : Object.entries(recipe.ingredients).map(([section, items]) => `
                <h3 style="margin-top:15px;">${section}</h3>

                <ul class="ingredient-list">
                    ${items.map(i => `
                        <li>
                            <label>
                                <input type="checkbox">
                                <span>${i}</span>
                            </label>
                        </li>
                    `).join("")}
                </ul>
            `).join("")
        }

    </div>

    <!-- ZUBEREITUNG -->
    <div class="card">
        <h2>Zubereitung</h2>
${recipe.steps.map((step, i) => `

<div class="step">

    <div class="step-number">${i + 1}</div>

    <div class="step-text">

        <p>${typeof step === "string" ? step : step.text}</p>

        ${
            typeof step !== "string" && step.images
            ? `
           <div class="step-images" style="width:100%;">
                ${step.images.map(img => `
                    <img 
src="${img}" 
class="step-image"
alt="${recipe.title} Zubereitung Schritt">
                `).join("")}
            </div>
            `
            : ""
        }

    </div>

</div>

`).join("")}





    ${recipe.tips ? `
    <div class="card">
        <h2>💡 Tipps</h2>
        <ul>
            ${recipe.tips.map(t => `<li>${t}</li>`).join("")}
        </ul>
    </div>
    ` : ""}
<div class="related-section">

    <h2>❤️ Das könnte dich auch interessieren</h2>

    <div class="related-container" id="relatedRecipes"></div>

</div>
</div>


`;

}


// FAVORITEN

const favoriteBtn = document.getElementById("favoriteBtn");

let favorites = JSON.parse(
    localStorage.getItem("favorites")
) || [];


function updateFavoriteButton(){

    if(favorites.includes(recipe.id)){

        favoriteBtn.innerHTML = "❤️ Gespeichert";

    } else {

        favoriteBtn.innerHTML = "♡ Favorit";

    }

}


favoriteBtn.onclick = function(){

    if(favorites.includes(recipe.id)){

        favorites = favorites.filter(
            id => id !== recipe.id
        );

    } else {

        favorites.push(recipe.id);

    }


    localStorage.setItem(
        "favorites",
        JSON.stringify(favorites)
    );


    updateFavoriteButton();

};


updateFavoriteButton();
const relatedContainer = document.getElementById("relatedRecipes");

if(recipe.related && relatedContainer){

    recipe.related.forEach(id => {

        const related = RECIPES.find(r => r.id == id);

        if(related){

            relatedContainer.innerHTML += `

            <a class="related-card" href="recipe.html?id=${related.id}">

                <img src="${related.image}" alt="${related.title}">

                <div class="related-content">
                    <h3>${related.title}</h3>
                    <p>${related.time.total}</p>
                </div>

            </a>

            `;

        }

    });

}

</script>

</body>
</html>
